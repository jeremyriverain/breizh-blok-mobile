targets:
  $default:
    sources:
      - $package$
      - lib/$lib$
      - lib/**.dart
      - test/**.dart
      - integration_test/**.dart
    builders:
      drift_dev:
        options:
          store_date_time_values_as_text: true
          databases:
            my_database: lib/data/data_sources/local/app_database.dart